server {
    listen 443 ssl;
    server_name poketactics.net www.poketactics.net;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Allow longer requests for file uploads or larger payloads
    client_max_body_size 20M;

    # WebSockets (assumes they're on /ws or similar path)
    location /api/ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Required for WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Backend API (FastAPI)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    # pgAdmin static files
    location ~ ^/db/admin/static/(.*)$ {
        proxy_pass http://pgadmin:80/static/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # pgAdmin API and browser paths
    location ~ ^/db/admin/(browser|user_management|tools)/ {
        rewrite ^/db/admin/(.*)$ /$1 break;
        proxy_pass http://pgadmin:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /db/admin;
    }

    # pgAdmin main application  
    location /db/admin/ {
        proxy_pass http://pgadmin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /db/admin;
        proxy_cookie_path / /db/admin/;
        
        # Rewrite static paths in HTML only
        sub_filter_once off;
        sub_filter 'href="/' 'href="/db/admin/';
        sub_filter "href='/" "href='/db/admin/";
        sub_filter 'src="/' 'src="/db/admin/';
        sub_filter "src='/" "src='/db/admin/";
        sub_filter '/static/' '/db/admin/static/';
        sub_filter '/browser/' '/db/admin/browser/';
        sub_filter '/user_management/' '/db/admin/user_management/';
        sub_filter '/tools/' '/db/admin/tools/';
        sub_filter_types text/html;
    }

    # Web app frontend (static files from frontend nginx)
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Don't cache the proxy, let frontend handle caching
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }
}

# Optional: Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name poketactics.net www.poketactics.net;

    return 301 https://$host$request_uri;
}
