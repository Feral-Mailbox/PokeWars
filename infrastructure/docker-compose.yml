version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env.db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../apps/backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/backend:/app
    expose:
      - "8000"

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../apps/frontend/.env
    depends_on:
      - backend
    expose:
      - "80"
    volumes:
      - ../assets:/usr/share/nginx/html/game-assets:ro

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - postgres
      - redis
      - backend
      - frontend

volumes:
  pgdata:
