version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../apps/backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/backend:/app
    expose:
      - "8000"

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../apps/frontend/.env
    depends_on:
      - backend
    expose:
      - "80"
    volumes:
      - ../assets:/usr/share/nginx/html/game-assets:ro

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - postgres
      - redis
      - backend
      - frontend

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@poketactics.dev
      PGADMIN_DEFAULT_PASSWORD: supersecure
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_SCRIPT_NAME_HEADER: "'X-Script-Name'"
      PGADMIN_CONFIG_PROXY: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_COOKIE_SAMESITE: "'Lax'"
      PGADMIN_CONFIG_ALLOW_ROOT: "True"
      PGADMIN_CONFIG_PROXY_X_SCRIPT_NAME: "'/db/admin'"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
